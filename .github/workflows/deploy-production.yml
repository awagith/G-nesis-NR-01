name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build e deploy para portal.genesis360care.com.br
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build produção
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: production
          VITE_APP_NAME: 'Gênesis NR-01'
          VITE_APP_URL: 'https://portal.genesis360care.com.br'

      - name: Deploy via rsync para o servidor
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/portal.genesis360care.com.br/
          remote_host: ${{ secrets.PROD_SERVER_HOST }}
          remote_user: ${{ secrets.PROD_SERVER_USER }}
          remote_key: ${{ secrets.PROD_SERVER_SSH_KEY }}

      - name: Recarregar Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: sudo systemctl reload nginx

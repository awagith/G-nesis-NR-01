name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Build e deploy para staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Build staging
        run: bun run build:staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: staging
          VITE_APP_NAME: 'Gênesis NR-01 [STAGING]'
          VITE_APP_URL: ${{ secrets.STAGING_APP_URL }}

      - name: Deploy via rsync para staging
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.STAGING_SERVER_PATH }}
          remote_host: ${{ secrets.PROD_SERVER_HOST }}
          remote_user: ${{ secrets.PROD_SERVER_USER }}
          remote_key: ${{ secrets.PROD_SERVER_SSH_KEY }}

      - name: Recarregar Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: sudo systemctl reload nginx

server {
    listen 80;
    server_name portal.genesis360care.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.genesis360care.com.br;

    # Certificado SSL (gerado pelo setup-portal.sh via certbot)
    ssl_certificate     /etc/letsencrypt/live/portal.genesis360care.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.genesis360care.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Root do build
    root /var/www/portal.genesis360care.com.br;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Assets com hash — cache longo (1 ano)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — sem cache (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logs
    access_log /var/log/nginx/portal.genesis360care.access.log;
    error_log  /var/log/nginx/portal.genesis360care.error.log;
}

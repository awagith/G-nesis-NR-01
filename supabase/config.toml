# Supabase CLI config — Gênesis NR-01
# Documentação: https://supabase.com/docs/reference/cli/config

[project]
# ID do projeto de DESENVOLVIMENTO
# Encontre em: supabase.com → seu projeto dev → Settings → General → Reference ID
id = "COLE_SEU_PROJECT_ID_DEV_AQUI"

[db]
port = 54322
shadow_port = 54320
major_version = 15

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "https://staging.seudominio.com.br",
  "https://seudominio.com.br"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true

[storage.buckets.documents]
public = false
file_size_limit = "50MiB"
allowed_mime_types = [
  "application/pdf",
  "application/msword",
  "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
  "application/vnd.ms-excel",
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  "image/jpeg",
  "image/png",
  "image/webp"
]
